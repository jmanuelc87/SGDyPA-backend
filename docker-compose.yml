services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sgdypa-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sgdypa}
      POSTGRES_USER: ${POSTGRES_USER:-sgdypa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sgdypa_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} && psql -U $${POSTGRES_USER} -d $${POSTGRES_DB} -tAc \"SELECT 1 FROM pg_extension WHERE extname = 'vector';\" | grep -q 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.0
    container_name: sgdypa-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: dev-file
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./docker/keycloak/sgdypa-realm.json:/opt/keycloak/data/import/sgdypa-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; printf 'GET /health/ready HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: sgdypa-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  minio-seed:
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: sgdypa-minio-seed
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-sgdypa-documents}
    entrypoint: ["/bin/sh", "/seed/minio-seed.sh"]
    volumes:
      - ./docker/minio/minio-seed.sh:/seed/minio-seed.sh:ro
    restart: "no"

  redis:
    image: redis:7.4-alpine
    container_name: sgdypa-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  celery-worker:
    image: python:3.12-slim
    container_name: sgdypa-celery-worker
    working_dir: /app
    command: >
      sh -c "pip install -e . &&
             celery -A config worker --loglevel=${CELERY_LOG_LEVEL:-INFO}"
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy

  celery-beat:
    image: python:3.12-slim
    container_name: sgdypa-celery-beat
    working_dir: /app
    command: >
      sh -c "pip install -e . &&
             celery -A config beat --loglevel=${CELERY_LOG_LEVEL:-INFO}
             --schedule=/tmp/celerybeat-schedule"
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy

  tika:
    image: apache/tika:2.9.2.1-full
    container_name: sgdypa-tika
    ports:
      - "${TIKA_PORT:-9998}:9998"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9998/tika | grep -qi tika"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  postgres_data:
  keycloak_data:
  minio_data:
  redis_data:
