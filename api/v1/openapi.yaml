openapi: 3.1.0
info:
  title: SGDyPA Backend API
  version: 0.1.0
  summary: Contract-first API surface for the SGDyPA SPA and trusted integrations.
  description: |
    Versioned OpenAPI contract for `/api/v1/`. New endpoints must update this
    file in the same pull request as their implementation.
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
servers:
  - url: /api/v1
    description: Versioned API root
security:
  - bearerJwt: []
tags:
  - name: Platform
    description: Platform-level health and asynchronous job primitives.
  - name: Identity
    description: Identity bootstrap, tenant users, roles, and memberships.
paths:
  /me:
    get:
      tags: [Identity]
      operationId: getMe
      summary: Bootstrap the SPA with the caller profile, memberships, roles, and orgs.
      responses:
        '200':
          description: Caller identity bootstrap.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /organizations:
    get:
      tags: [Identity]
      operationId: listOrganizations
      summary: List organizations where the caller has a membership.
      responses:
        '200':
          description: Available organizations.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Organization'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /users:
    get:
      tags: [Identity]
      operationId: listUsers
      summary: List read-only user projections in the active organization.
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      responses:
        '200':
          description: User projections.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /users/{id}:
    get:
      tags: [Identity]
      operationId: getUser
      summary: Read a user projection in the active organization.
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
        - name: id
          in: path
          required: true
          schema: {type: integer}
      responses:
        '200':
          description: User projection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /roles:
    get:
      tags: [Identity]
      operationId: listRoles
      summary: List role definitions.
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      responses:
        '200':
          description: Roles.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /roles/{id}:
    get:
      tags: [Identity]
      operationId: getRole
      summary: Read a role definition.
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Role definition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /memberships:
    get:
      tags: [Identity]
      operationId: listMemberships
      summary: List memberships in the active organization.
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      responses:
        '200':
          description: Memberships.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Membership'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Identity]
      operationId: inviteMembership
      summary: Invite a projected user to the active organization.
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MembershipWrite'
      responses:
        '201':
          description: Membership invited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membership'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /memberships/{id}/roles:
    post:
      tags: [Identity]
      operationId: addMembershipRole
      summary: Assign a role to a membership.
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_id]
              properties:
                role_id: {type: string, format: uuid}
      responses:
        '201':
          description: Role assignment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipRole'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /memberships/{id}/roles/{role_id}:
    delete:
      tags: [Identity]
      operationId: deleteMembershipRole
      summary: Remove a role from a membership.
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
        - name: role_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '204': {description: Role removed.}
        default:
          $ref: '#/components/responses/ErrorResponse'
  /health-checks:
    get:
      tags: [Platform]
      operationId: getHealthCheck
      summary: Check API availability.
      security: []
      responses:
        '200':
          description: API is available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheck'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /platform/async-jobs:
    post:
      tags: [Platform]
      operationId: createAsyncJob
      summary: Enqueue an idempotent asynchronous platform job.
      description: |
        Baseline async primitive for deferred API operations. Mutating callers
        must provide a stable `Idempotency-Key` UUID so retries do not duplicate
        the operation.
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsyncJobCreateRequest'
      responses:
        '202':
          description: Job accepted or previously accepted for the same idempotency key.
          headers:
            Location:
              description: Absolute URL for polling the job status.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncJob'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /platform/async-jobs/{job_id}:
    get:
      tags: [Platform]
      operationId: getAsyncJob
      summary: Poll an asynchronous platform job.
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Current job status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncJob'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
components:
  securitySchemes:
    bearerJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Keycloak-issued access token validated by the API.
  parameters:
    OrganizationIdHeader:
      name: X-Organization-Id
      in: header
      required: true
      description: Active organization scope validated against the caller memberships.
      schema:
        type: string
        format: uuid
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: true
      description: Stable UUID used to make mutating requests retry-safe.
      schema:
        type: string
        format: uuid
  responses:
    ErrorResponse:
      description: Stable API error envelope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    HealthCheck:
      type: object
      required: [status, checked_at]
      properties:
        status:
          type: string
          const: ok
        checked_at:
          type: string
          format: date-time
    AsyncJobStatus:
      type: string
      enum: [pending, started, completed, failed]
    AsyncJobCreateRequest:
      type: object
      additionalProperties: false
      properties:
        operation:
          type: string
          default: platform.noop
          minLength: 1
    AsyncJob:
      type: object
      required: [id, operation, status, task_id, result, error, created_at, updated_at, completed_at, url]
      properties:
        id:
          type: string
          format: uuid
        operation:
          type: string
        status:
          $ref: '#/components/schemas/AsyncJobStatus'
        task_id:
          type: [string, 'null']
        result:
          type: [object, 'null']
          additionalProperties: true
        error:
          type: string
          description: Failure detail; empty string when the job has not failed.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        completed_at:
          type: [string, 'null']
          format: date-time
        url:
          type: string
          format: uri
    Organization:
      type: object
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        slug: {type: string}
        is_active: {type: boolean}
    User:
      type: object
      properties:
        id: {type: integer}
        email: {type: string, format: email}
        email_verified: {type: boolean}
        display_name: {type: string}
        first_name: {type: string}
        last_name: {type: string}
    Role:
      type: object
      properties:
        id: {type: string, format: uuid}
        code: {type: string}
        name: {type: string}
        capabilities:
          type: array
          items: {type: string}
        is_system: {type: boolean}
    MembershipRole:
      type: object
      properties:
        id: {type: string, format: uuid}
        role:
          $ref: '#/components/schemas/Role'
        assigned_at: {type: string, format: date-time}
    Membership:
      type: object
      properties:
        id: {type: string, format: uuid}
        organization:
          $ref: '#/components/schemas/Organization'
        user:
          $ref: '#/components/schemas/User'
        status: {type: string, enum: [invited, active, suspended, revoked]}
        es_invitada: {type: boolean}
        alcance: {type: object, additionalProperties: true}
        expira_en: {type: [string, 'null'], format: date-time}
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        invited_at: {type: string, format: date-time}
        accepted_at: {type: [string, 'null'], format: date-time}
    MembershipWrite:
      type: object
      required: [user_id]
      properties:
        user_id: {type: integer}
        status: {type: string, enum: [invited, active, suspended, revoked]}
        alcance: {type: object, additionalProperties: true}
        expira_en: {type: [string, 'null'], format: date-time}
    Me:
      type: object
      properties:
        profile:
          $ref: '#/components/schemas/User'
        memberships:
          type: array
          items:
            $ref: '#/components/schemas/Membership'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        orgs:
          type: array
          items:
            $ref: '#/components/schemas/Organization'
    ErrorCode:
      type: string
      enum:
        - scope_frozen
        - illegal_transition
        - legal_hold_active
        - self_approval_forbidden
        - validation_failed
        - stale_state
        - idempotency_key_required
        - idempotency_key_invalid
        - idempotency_key_conflict
        - authentication_failed
        - not_authenticated
        - not_found
        - method_not_allowed
        - permission_denied
        - parse_error
        - throttled
        - unsupported_media_type
        - internal_error
    ErrorDetail:
      type: object
      additionalProperties: true
      properties:
        field:
          type: string
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
    ErrorDetails:
      description: >-
        Error context. An array of ErrorDetail entries for most errors, or a
        map of field name to validation messages for validation_failed
        responses.
      oneOf:
        - type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
        - type: object
          additionalProperties: true
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message, details, request_id]
          properties:
            code:
              $ref: '#/components/schemas/ErrorCode'
            message:
              type: string
            request_id:
              type: string
              description: Correlation id echoed from the X-Request-Id middleware.
            details:
              $ref: '#/components/schemas/ErrorDetails'
